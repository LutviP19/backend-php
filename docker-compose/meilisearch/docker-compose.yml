services:
  meilisearch:
    image: getmeili/meilisearch:v1.12.0  # Fully specified semantic version to block unexpected engine breaks
    container_name: meilisearch_engine
    restart: unless-stopped
    pull_policy: if_not_present         # Freeze your local image and avoid auto-downloading updates
    ports:
      - "7700:7700"                     # Core search API and visual mini-dashboard interface port
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-ms}
      - MEILI_ENV=development           # Enables the beautiful built-in visual web dashboard on port 7700
    volumes:
      - meili_data:/data.ms             # Swapped to a named volume for fast disk I/O indexing performance
    healthcheck:
      # Using a native health check that doesn't rely on curl, as curl is stripped from many minimal images
      test: ["CMD", "tini", "--", "meilisearch", "--help"] 
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  meili_data:                           # Root-level named volume declaration for stable indices persistence
    driver: local
