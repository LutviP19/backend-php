services:
  mongodb:
    image: mongo:latest
    pull_policy: if_not_present
    container_name: mongodb_container
    restart: unless-stopped
    # Security Rule: Optimization for local development only. 
    # Remove ports array in production to isolate data behind the proxy network layer.
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongo_data:/data/db
    networks:
      - mongo_network
    # Fixed & Optimized: Passes clean routing parameters to ensure local auth sweeps don't lag
    healthcheck:
      test: ["CMD", "mongosh", "--username", "admin", "--password", "password123", "--authenticationDatabase", "admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  mongo-express:
    image: mongo-express:latest
    pull_policy: if_not_present
    container_name: express_container
    restart: unless-stopped
    ports:
      - "8282:8081"
    environment:
      # Connection parameters to find MongoDB via internal container aliases
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_SERVER: mongodb_container
      
      # Fixed: Correct format required by the underlying Mongo Express Node runtime
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      
      # Web UI Dashboard basic auth credentials
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password123
    networks:
      - mongo_network
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
    driver: local

networks:
  mongo_network:
    driver: bridge
