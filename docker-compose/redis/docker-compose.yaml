services:
  redis-stack:
    image: redis/redis-stack:latest
    pull_policy: if_not_present
    container_name: redis-stack
    restart: unless-stopped
    ports:
      - "6379:6379"   # Core Redis database port
      - "8001:8001"   # RedisInsight Web UI port
    environment:
      - REDIS_ARGS=--protected-mode no --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data:
    driver: local
